<html lang="fr">
<head>
<meta charset="UTF-8">

<title>StreamHub</title>

<style>
:root{
  --bg:#0A0E14;
  --surface:#12171F;
  --surface2:#1B222C;
  --amber:#FFB020;
  --teal:#2DD4BF;
  --text:#E8ECF1;
  --muted:#8B96A5;
  --danger:#FF5D5D;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
}
h1,h2,h3,.brand,.tile-title,.nav-label{
  font-family:'Space Grotesk','Inter',sans-serif;
}
/* ===== Layout ===== */
.app{display:flex;height:100vh;width:100vw;}
.sidebar{
  width:84px;
  background:linear-gradient(180deg,#0D1218,#0A0E14);
  border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;align-items:center;
  padding:22px 0;
  flex-shrink:0;
  transition:width .25s ease;
  z-index:20;
}
.sidebar:hover{width:210px;}
.brand{
  color:var(--amber);
  font-weight:700;
  font-size:20px;
  letter-spacing:.5px;
  margin-bottom:34px;
  white-space:nowrap;
  overflow:hidden;
  width:100%;
  text-align:center;
}
.sidebar:hover .brand{text-align:left;padding-left:22px;}
.nav-item{
  width:100%;
  display:flex;align-items:center;gap:14px;
  padding:14px 0 14px 28px;
  color:var(--muted);
  cursor:pointer;
  position:relative;
  white-space:nowrap;
  overflow:hidden;
}
.nav-item svg{flex-shrink:0;width:22px;height:22px;}
.nav-label{opacity:0;transition:opacity .15s;font-size:14px;font-weight:600;}
.sidebar:hover .nav-label{opacity:1;}
.nav-item.active{color:var(--amber);background:rgba(255,176,32,0.08);}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);
}
.nav-item:focus-visible, .tile:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{
  outline:2px solid var(--teal);outline-offset:2px;
}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{
  height:64px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:linear-gradient(180deg,rgba(10,14,20,.9),rgba(10,14,20,0));
}
.topbar h2{font-size:20px;font-weight:600;}
.clock{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums;}
.view{flex:1;overflow-y:auto;padding:8px 32px 40px;}
.view::-webkit-scrollbar{width:8px;}
.view::-webkit-scrollbar-thumb{background:#252c37;border-radius:4px;}

/* ===== Rows / tiles ===== */
.row{margin-bottom:34px;}
.row-title{font-size:16px;font-weight:600;margin-bottom:14px;color:#C9D2DC;}
.tiles{display:flex;gap:16px;overflow-x:auto;padding:8px 2px 14px;}
.tiles::-webkit-scrollbar{height:6px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}

.tile{
  position:relative;
  flex:0 0 200px;
  height:120px;
  border-radius:10px;
  background:var(--surface2);
  cursor:pointer;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;
  transition:transform .18s ease;
  border:2px solid transparent;
}
.grid .tile{flex:none;width:100%;}
.tile:hover, .tile.focused{
  transform:scale(1.06);
  z-index:2;
  border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(255,176,32,.15), 0 10px 24px rgba(0,0,0,.5);
}
.tile.focused::after{
  content:'';position:absolute;inset:-6px;border-radius:14px;
  background:conic-gradient(from 0deg, var(--amber), transparent 30%, transparent 70%, var(--amber));
  z-index:-1;
  animation:dial 2.4s linear infinite;
  opacity:.55;
}
@keyframes dial{to{transform:rotate(360deg);}}
.tile .thumb{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.85;}
.tile .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.85));}
.tile-body{position:relative;padding:10px 12px;z-index:1;}
.tile-title{font-size:13px;font-weight:600;line-height:1.25;}
.tile-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.tile-badge{
  position:absolute;top:8px;right:8px;z-index:2;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:rgba(0,0,0,.55);color:var(--teal);letter-spacing:.5px;
}
.tile.add-tile{
  display:flex;align-items:center;justify-content:center;
  border:2px dashed #2a3340;background:transparent;
  color:var(--muted);font-size:28px;
}
.tile.add-tile:hover{color:var(--amber);border-color:var(--amber);}

/* ===== Hero ===== */
.hero{
  height:260px;border-radius:14px;position:relative;overflow:hidden;margin-bottom:32px;
  background:radial-gradient(circle at 20% 20%, #1c2431, #0A0E14 70%);
  display:flex;align-items:flex-end;padding:28px;
  border:1px solid rgba(255,255,255,.05);
}
.hero h1{font-size:30px;margin-bottom:8px;}
.hero p{color:var(--muted);max-width:520px;font-size:14px;line-height:1.5;}
.hero .tag{color:var(--amber);font-size:12px;font-weight:700;letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase;}

/* ===== Forms ===== */
.panel{background:var(--surface);border-radius:12px;padding:24px;margin-bottom:24px;border:1px solid rgba(255,255,255,.05);}
.panel h3{font-size:15px;margin-bottom:16px;color:var(--amber);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a3340;
  background:#0D1218;color:var(--text);font-size:14px;font-family:inherit;
}
.field textarea{min-height:90px;resize:vertical;}
.row-inline{display:flex;gap:12px;}
.row-inline .field{flex:1;}
.btn{
  background:var(--amber);color:#1a1300;border:none;padding:10px 18px;border-radius:8px;
  font-weight:700;cursor:pointer;font-size:13px;letter-spacing:.3px;
}
.btn.secondary{background:transparent;border:1px solid #2a3340;color:var(--text);}
.btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn:hover{filter:brightness(1.1);}
.subtabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.subtab{
  padding:8px 16px;border-radius:20px;background:var(--surface2);color:var(--muted);
  font-size:13px;cursor:pointer;font-weight:600;
}
.subtab.active{background:var(--amber);color:#1a1300;}
.note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px;padding:10px 12px;background:rgba(255,255,255,.03);border-left:3px solid var(--teal);border-radius:4px;}
.empty{color:var(--muted);font-size:13px;padding:20px 0;}

/* ===== Player modal ===== */
.player-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;
  display:none;align-items:center;justify-content:center;flex-direction:column;
}
.player-overlay.open{display:flex;}
.player-box{width:min(1100px,92vw);}
.player-box video, .player-box iframe{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;border:none;}
.player-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.player-head h3{font-size:15px;}
.close-btn{background:var(--surface2);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;}
.player-status{color:var(--muted);font-size:12px;margin-top:10px;}

.search-bar{
  display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:20px;padding:8px 16px;width:260px;
}
.search-bar input{background:transparent;border:none;color:var(--text);font-size:13px;width:100%;outline:none;}

/* ===== Lecteur intégré (plein écran dans la zone de contenu) ===== */
.player-page{display:flex;flex-direction:column;height:100%;}
.player-stage{
  flex:1;background:#000;border-radius:14px;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;min-height:0;
}
.player-stage video, .player-stage iframe{width:100%;height:100%;border:none;background:#000;}
.player-info{padding:18px 4px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.player-info h2{font-size:18px;font-weight:600;}
.player-info .sub{color:var(--muted);font-size:13px;margin-top:2px;}
.player-back{
  background:var(--surface2);border:none;color:var(--text);padding:10px 18px;border-radius:8px;
  cursor:pointer;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:16px;
}
.player-back:hover{background:#232b37;}
.player-status-line{color:var(--muted);font-size:12px;margin-top:8px;}
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="brand">📺 StreamHub</div>
    <div class="nav-item active" data-view="home" tabindex="0">

  <div class="main">

      <div style="display:flex;align-items:center;gap:18px;">
        <div class="search-bar"><span>🔍</span><input id="globalSearch" placeholder="Rechercher une chaîne, une vidéo..."></div>
        <div class="clock" id="clock">--:--</div>
      </div>

</div>



<script>
/* ===================== STORAGE ===================== */
const DB = {
  get(k, d){ try{ return JSON.parse(localStorage.getItem('sh_'+k)) ?? d; }catch(e){ return d; } },
  set(k, v){ localStorage.setItem('sh_'+k, JSON.stringify(v)); }
};
let state = {
  youtube: DB.get('youtube', []),          // {id,title,type:'video'|'live'}
  m3u: DB.get('m3u', {url:'', raw:'', channels:[]}),
  xtream: DB.get('xtream', {server:'',username:'',password:'',categories:[],streams:[]}),
  stalker: DB.get('stalker', {portal:'',mac:'',channels:[]}),
  history: DB.get('history', []),
  proxy: DB.get('proxy', 'https://STREAMHUB--5494c6567b9011f18e851607ee4eb77e.web.val.run'),
  googleClientId: DB.get('googleClientId', '654265541879-4f8mb6u2m507aiju0iu87r9dh5p8s8dr.apps.googleusercontent.com'),
  youtubeApiKey: DB.get('youtubeApiKey', 'AIzaSyCL9edDCtFY64GZH7sZVnmi4g7Cetoorik'),
  subscriptions: [],
  view: 'home',
};

function save(){
  DB.set('youtube', state.youtube);
  DB.set('m3u', state.m3u);
  DB.set('xtream', state.xtream);
  DB.set('stalker', state.stalker);
  DB.set('history', state.history);
  DB.set('proxy', state.proxy);
  DB.set('googleClientId', state.googleClientId);
  DB.set('youtubeApiKey', state.youtubeApiKey);
}
function pushHistory(item){
  state.history.unshift({...item, ts:Date.now()});
  state.history = state.history.slice(0,20);
  save();
}

// Force les valeurs par défaut si elles sont vides (ex: ancienne sauvegarde vide en localStorage)
if(!state.proxy) state.proxy = 'https://STREAMHUB--5494c6567b9011f18e851607ee4eb77e.web.val.run';
if(!state.youtubeApiKey) state.youtubeApiKey = 'AIzaSyCL9edDCtFY64GZH7sZVnmi4g7Cetoorik';
save();

/* ===================== NAV ===================== */
const titles = {home:'Accueil', youtube:'YouTube', molotov:'Molotov TV', iptv:'IPTV', sources:'Mes sources'};
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=> switchView(el.dataset.view));
  el.addEventListener('keydown', e=>{ if(e.key==='Enter') switchView(el.dataset.view); });
});
function switchView(v){
  state.view = v;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===v));
  document.getElementById('viewTitle').textContent = titles[v];
  render();
}

/* ===================== CLOCK ===================== */
function tickClock(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(tickClock,1000); tickClock();

/* ===================== RENDER ROUTER ===================== */
const viewEl = document.getElementById('view');
function render(){
  if(state.view==='home') renderHome();
  else if(state.view==='youtube') renderYoutube();
  else if(state.view==='molotov') renderMolotov();
  else if(state.view==='iptv') renderIptv('m3u');
  else if(state.view==='sources') renderSources();
  attachFocusNav();
}

function tileHTML({title, sub, badge, thumb, onclickAttr}){
  return `<div class="tile" tabindex="0" ${onclickAttr}>
    ${thumb?`<div class="thumb" style="background-image:url('${thumb}')"></div>`:''}
    <div class="scrim"></div>
    ${badge?`<div class="tile-badge">${badge}</div>`:''}
    <div class="tile-body">
      <div class="tile-title">${title}</div>
      ${sub?`<div class="tile-sub">${sub}</div>`:''}
    </div>
  </div>`;
}

/* ===================== HOME ===================== */
function renderHome(){
  const recent = state.history;
  viewEl.innerHTML = `
    <div class="hero">
      <div>
        <div class="tag">Votre hub personnel</div>
        <h1>Toutes vos sources, un seul écran</h1>
        <p>YouTube, Molotov TV et vos flux IPTV (Xtream Codes, Stalker Portal, M3U) réunis dans une interface façon Android TV. Configurez vos sources dans l'onglet <strong>Sources</strong>.</p>
      </div>
    </div>
    <div class="row">
      <div class="row-title">Reprendre la lecture</div>
      <div class="tiles" id="recentRow">
        ${recent.length? recent.map(r=>tileHTML({title:r.title, sub:r.source, badge:r.source, onclickAttr:`data-play='${encodeURIComponent(JSON.stringify(r))}'`})).join(''): '<div class="empty">Rien pour l\'instant — lancez une chaîne ou une vidéo.</div>'}
      </div>
    </div>
    <div class="row">
      <div class="row-title">Accès rapide</div>
      <div class="tiles">
        ${tileHTML({title:'YouTube', sub:'Chaînes & vidéos', onclickAttr:`data-nav="youtube"`})}
        ${tileHTML({title:'Molotov TV', sub:'TV en direct', onclickAttr:`data-nav="molotov"`})}
        ${tileHTML({title:'IPTV M3U', sub:'Playlist personnelle', onclickAttr:`data-nav="iptv"`})}
        ${tileHTML({title:'Sources', sub:'Configurer mes accès', onclickAttr:`data-nav="sources"`})}
      </div>
    </div>`;
  viewEl.querySelectorAll('[data-nav]').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.nav)));
  viewEl.querySelectorAll('[data-play]').forEach(t=>t.addEventListener('click',()=>{
    const item = JSON.parse(decodeURIComponent(t.dataset.play));
    playItem(item);
  }));
}

/* ===================== YOUTUBE ===================== */
function extractYouTubeId(input){
  input = input.trim();
  const patterns = [
    /(?:v=|\/videos\/|embed\/|youtu\.be\/|\/live\/)([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for(const p of patterns){ const m = input.match(p); if(m) return m[1]; }
  return null;
}
let gAccessToken = null;
let gTokenClient = null;
let ytChannelView = null; // {channelId, title, videos} when drilled into a subscribed channel

function ensureGoogleAuth(){
  if(!state.googleClientId){ alert('Configure ton Client ID Google dans Sources.'); switchView('sources'); return false; }
  if(!window.google || !google.accounts){ alert('La librairie Google est encore en train de charger, réessaie dans une seconde.'); return false; }
  if(!gTokenClient){
    gTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: state.googleClientId,
      scope: 'https://www.googleapis.com/auth/youtube.readonly',
      callback: (resp)=>{
        if(resp.error){ alert('Connexion Google refusée ou échouée : '+resp.error); return; }
        gAccessToken = resp.access_token;
        fetchSubscriptions();
      }
    });
  }
  return true;
}
function connectGoogle(){
  if(!ensureGoogleAuth()) return;
  gTokenClient.requestAccessToken();
}
async function fetchSubscriptions(){
  const statusEl = document.getElementById('ytAuthStatus');
  if(statusEl) statusEl.textContent = 'Chargement de tes abonnements...';
  try{
    const res = await fetch('https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50&order=alphabetical', {
      headers:{ 'Authorization': 'Bearer '+gAccessToken }
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    state.subscriptions = (data.items||[]).map(it=>({
      channelId: it.snippet.resourceId.channelId,
      title: it.snippet.title,
      thumb: it.snippet.thumbnails?.medium?.url || it.snippet.thumbnails?.default?.url
    }));
    ytChannelView = null;
    renderYoutube(); attachFocusNav();
  }catch(e){
    if(statusEl) statusEl.textContent = "Échec : "+e.message;
  }
}
async function openChannelUploads(channelId, title){
  ytChannelView = {channelId, title, videos: null};
  renderYoutube(); attachFocusNav();
  try{
    const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}`, {
      headers:{ 'Authorization': 'Bearer '+gAccessToken }
    });
    const chData = await chRes.json();
    const uploadsId = chData.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;
    if(!uploadsId) throw new Error('Playlist des vidéos introuvable.');
    const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=24&playlistId=${uploadsId}`, {
      headers:{ 'Authorization': 'Bearer '+gAccessToken }
    });
    const plData = await plRes.json();
    const videos = (plData.items||[]).map(it=>({
      id: it.snippet.resourceId.videoId,
      title: it.snippet.title,
      thumb: it.snippet.thumbnails?.medium?.url
    }));
    ytChannelView = {channelId, title, videos};
    renderYoutube(); attachFocusNav();
  }catch(e){
    ytChannelView = {channelId, title, videos: [], error: e.message};
    renderYoutube(); attachFocusNav();
  }
}

async function searchYouTube(query){
  const key = state.youtubeApiKey;
  if(!key){ alert('Configure ta clé API YouTube dans Sources.'); switchView('sources'); return; }
  const resultsEl = document.getElementById('ytSearchResults');
  resultsEl.innerHTML = '<div class="empty">Recherche en cours...</div>';
  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=16&q=${encodeURIComponent(query)}&key=${key}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const videos = (data.items||[]).map(it=>({
      id: it.id.videoId, title: it.snippet.title, channel: it.snippet.channelTitle,
      thumb: it.snippet.thumbnails?.medium?.url
    }));
    resultsEl.innerHTML = videos.length ? videos.map((v,i)=>tileHTML({
      title:v.title, sub:v.channel, thumb:v.thumb, onclickAttr:`data-res="${i}"`
    })).join('') : '<div class="empty">Aucun résultat.</div>';
    resultsEl.querySelectorAll('.tile[data-res]').forEach(t=>{
      t.addEventListener('click',()=>{
        const v = videos[t.dataset.res];
        openFramePlayer(v.title, `https://www.youtube.com/embed/${v.id}?autoplay=1`);

function parseM3U(text){
  const lines = text.split(/\r?\n/);
  const channels = [];
  let cur = null;
  for(const line of lines){
    if(line.startsWith('#EXTINF')){
      const nameMatch = line.split(',').pop();
      const logo = (line.match(/tvg-logo="([^"]+)"/)||[])[1];
      const group = (line.match(/group-title="([^"]+)"/)||[])[1];
      cur = { name: nameMatch?.trim() || 'Chaîne', logo, group };
    } else if(line && !line.startsWith('#')){
      if(cur){ cur.url = line.trim(); channels.push(cur); cur=null; }
    }
  }
  return channels;
}

      <button class="btn" id="xConnect">Se connecter</button>
      <div class="note">Si "Failed to fetch" apparaît, ton panel bloque les appels directs depuis un navigateur (CORS). Renseigne l'URL de ton proxy Netlify ci-dessus pour contourner le blocage — voir l'onglet Sources pour le déployer.</div>
      <div class="note" id="xStatus" style="display:none;"></div>

      </div>
    </div>`;
}
function proxied(url, extraHeaders){
  const proxy = (document.getElementById('xProxy')?.value || document.getElementById('stProxy')?.value || state.proxy || '').trim();
  if(!proxy) return fetch(url, extraHeaders? {headers:extraHeaders} : undefined);

  // Proxy "préfixe" du type https://corsproxy.io/?url=  -> on colle l'URL encodée juste après
  if(proxy.endsWith('=') || proxy.endsWith('/')){
    return fetch(proxy + encodeURIComponent(url));
  }
  // Proxy "fonction" du type notre propre Netlify function -> paramètres url/headers séparés
  const p = new URL(proxy);
  p.searchParams.set('url', url);
  if(extraHeaders) p.searchParams.set('headers', JSON.stringify(extraHeaders));
  return fetch(p.toString());
}

async function xtreamConnect(){
  const server = document.getElementById('xServer').value.replace(/\/$/,'');
  const username = document.getElementById('xUser').value;
  const password = document.getElementById('xPass').value;
  const proxy = document.getElementById('xProxy').value.trim();
  const statusEl = document.getElementById('xStatus');
  statusEl.style.display='block'; statusEl.textContent = 'Connexion en cours...';
  state.proxy = proxy; save();
  try{
    const url = `${server}/player_api.php?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&action=get_live_streams`;
    const res = await proxied(url);
    const text = await res.text();
    if(!text || !text.trim()) throw new Error('Réponse vide — le portail bloque probablement les appels cross-origin (CORS). Configure un proxy ci-dessus.');
    const data = JSON.parse(text);
    const streams = data.map(s=>({
      name: s.name, category: s.category_id, icon: s.stream_icon,
      id: s.stream_id
    }));
    state.xtream = {server, username, password, streams};
    save();
    statusEl.textContent = streams.length+' chaînes récupérées.' + (proxy? ' (via proxy)':'');
    renderIptv('xtream');
  }catch(e){
    statusEl.textContent = "Échec de connexion : " + e.message;
  }
}

async function stalkerApiCall(action, extraParams){
  const st = state.stalker;
  const cookieMac = `mac=${encodeURIComponent(st.mac)}`;
  const url = `${st.portal}/portal.php?${extraParams}&JsHttpRequest=1-xml`;
  const res = await proxied(url, { 'Authorization': 'Bearer '+st.token, 'Cookie': cookieMac });
  const text = await res.text();
  if(!text || !text.trim()) throw new Error(`Réponse vide pour "${action}" (session expirée ou CORS).`);
  return JSON.parse(text);
}

  }catch(e){ statusEl.textContent = 'Erreur : '+e.message; }
}
async function loadStalkerSeriesItems(catId, catTitle){
  const statusEl = document.getElementById('stSeriesStatus');
  state.stalker.seriesCategoryView = {id:catId, title:catTitle};
  state.stalker.seriesItems = null;
  renderIptv('stalker'); attachFocusNav();
  try{
    const data = await stalkerApiCall('series_items', `type=series&action=get_ordered_list&category_id=${catId}&p=1&JsHttpRequest=1-xml`);
    const items = (data?.js?.data || []).map(v=>({ name:v.name, cmd:v.cmd, thumb:v.screenshot_uri || v.pic, series: v.series || [] }));
    state.stalker.seriesItems = items;
    renderIptv('stalker'); attachFocusNav();

async function playStalkerSeriesEpisode(item, episodeNum){
  const st = state.stalker;
  const cookieMac = `mac=${encodeURIComponent(st.mac)}`;
  const url = `${st.portal}/portal.php?type=series&action=create_link&cmd=${encodeURIComponent(item.cmd)}&series=${episodeNum}&JsHttpRequest=1-xml`;
  const res = await proxied(url, { 'Authorization': 'Bearer '+st.token, 'Cookie': cookieMac });
  const text = await res.text();
  const data = JSON.parse(text);
  let streamUrl = (data?.js?.cmd || '').replace(/^ffmpeg\s+/i,'').trim();
  return streamUrl;
}

function extractStalkerChannelId(cmd){
  const m = (cmd||'').match(/\/ch\/(\d+)_?/) || (cmd||'').match(/stream=(\d+)/);
  return m ? m[1] : null;
}
function exportStalkerAsM3U(){
  const st = state.stalker;
  const statusEl = document.getElementById('stExportStatus');
  if(!st.portal || !st.mac){ if(statusEl){statusEl.style.display='block';statusEl.textContent='Connecte-toi d\'abord.';} return; }
  const lines = ['#EXTM3U'];
  let count = 0;
  for(const c of st.channels){
    const id = extractStalkerChannelId(c.cmd);
    if(!id) continue;
    const url = `${st.portal}/play/live.php?mac=${encodeURIComponent(st.mac)}&stream=${id}&extension=m3u8`;
    lines.push(`#EXTINF:-1,${c.name}`);
    lines.push(url);
    count++;
  }
  const blob = new Blob([lines.join('\n')], {type:'application/vnd.apple.mpegurl'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stalker-export.m3u8';
  document.body.appendChild(a);
  a.click();
  a.remove();
  if(statusEl){ statusEl.style.display='block'; statusEl.textContent = `${count} chaînes exportées. Teste le fichier dans VLC pour confirmer si ce motif d'URL fonctionne sur ton portail.`; }
}
async function resolveStalkerStreamUrl(channel){
  const st = state.stalker;
  if(!st.portal || !st.token) throw new Error('Session Stalker expirée, reconnecte-toi.');
  const cookieMac = `mac=${encodeURIComponent(st.mac)}`;
  const url = `${st.portal}/portal.php?type=itv&action=create_link&cmd=${encodeURIComponent(channel.cmd)}&JsHttpRequest=1-xml`;
  const res = await proxied(url, { 'Authorization': 'Bearer '+st.token, 'Cookie': cookieMac });
  const text = await res.text();
  if(!text || !text.trim()) throw new Error('Réponse vide du portail (CORS ou session expirée).');
  let data;
  try{ data = JSON.parse(text); }
  catch(e){ throw new Error('Réponse non-JSON reçue.'); }
  let streamUrl = data?.js?.cmd || '';
  streamUrl = streamUrl.replace(/^ffmpeg\s+/i, '').trim();
  if(!streamUrl) throw new Error('Aucune URL de flux renvoyée par le portail.');
  return streamUrl;
}

async function stalkerConnect(){
  const portal = document.getElementById('stPortal').value.replace(/\/portal\.php.*$/,'');
  const mac = document.getElementById('stMac').value;
  const proxy = document.getElementById('stProxy').value.trim();
  const statusEl = document.getElementById('stStatus');
  statusEl.style.display='block'; statusEl.textContent='Handshake en cours...';
  state.proxy = proxy; save();

  async function safeJson(res, step){
    const text = await res.text();
    if(!text || !text.trim()){
      throw new Error(`Réponse vide reçue à l'étape "${step}" (status ${res.status}). ${proxy? "Même via le proxy, rien n'est revenu — vérifie l'URL du portail et la MAC." : "Le portail bloque probablement les requêtes cross-origin (CORS). Renseigne un proxy ci-dessus."}`);
    }
    try{ return JSON.parse(text); }
    catch(e){ throw new Error(`Réponse non-JSON reçue à l'étape "${step}" (status ${res.status}). Extrait: ${text.slice(0,120)}`); }
  }

  try{
    const base = portal;
    const cookieMac = `mac=${encodeURIComponent(mac)}`;
    let hsRes;
    try{
      hsRes = await proxied(`${base}/portal.php?type=stb&action=handshake&JsHttpRequest=1-xml`, { 'Cookie': cookieMac });
    }catch(networkErr){
      throw new Error(`La requête réseau a échoué avant même d'atteindre le serveur (CORS, mixed-content http/https, ou portail injoignable). ${proxy? "Le proxy lui-même est peut-être injoignable — vérifie son URL." : "Renseigne un proxy CORS ci-dessus (voir onglet Sources)."} Détail : ${networkErr.message}`);
    }
    const hsData = await safeJson(hsRes, 'handshake');
    const token = hsData?.js?.token;
    if(!token){
      const raw = JSON.stringify(hsData).slice(0,200);
      throw new Error(`Handshake reçu mais aucun token dans la réponse. Réponse brute : ${raw} — si le proxy utilisé ne transmet pas les en-têtes (Cookie avec la MAC), le portail répond sans authentifier la session. Essaie sans proxy si ton portail est en https://, ou utilise ton propre proxy (voir onglet Sources, option avancée).`);
    }

    const chRes = await proxied(`${base}/portal.php?type=itv&action=get_all_channels&JsHttpRequest=1-xml`, { 'Authorization': 'Bearer '+token, 'Cookie': cookieMac });
    const chData = await safeJson(chRes, 'get_all_channels');
    const list = (chData?.js?.data || []).map(c=>({ name: c.name, id: c.id, cmd: c.cmd, genreId: c.tv_genre_id }));

    let genres = [];
    try{
      const genRes = await proxied(`${base}/portal.php?type=itv&action=get_genres&JsHttpRequest=1-xml`, { 'Authorization': 'Bearer '+token, 'Cookie': cookieMac });
      const genData = await safeJson(genRes, 'get_genres');
      genres = (genData?.js || []).map(g=>({id:g.id, title:g.title}));
    }catch(e){ /* les genres sont un bonus, on continue sans si ça échoue */ }

    state.stalker = { portal, mac, channels: list, itvCategories: genres, token };
    save();
    statusEl.textContent = list.length + ' chaînes récupérées.' + (proxy? ' (via proxy)':'');
    renderIptv('stalker');
  }catch(e){
    statusEl.textContent = "Échec de connexion Stalker Portal : " + e.message;
  }
}

let hlsInstance = null;
let playerData = null; // {title, sub, kind:'video'|'iframe', src}
let previousView = 'home';

function openVideoPlayer(title, url, sub, forceProxy){
  if(!url){ alert('URL de flux introuvable.'); return; }
  playerData = {title, sub: sub||'', kind:'video', src:url, forceProxy: !!forceProxy};
  goToPlayerView();
}
function openFramePlayer(title, url, sub){
  playerData = {title, sub: sub||'', kind:'iframe', src:url};
  goToPlayerView();
}
function goToPlayerView(){
  if(state.view !== 'player') previousView = state.view;
  state.view = 'player';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('viewTitle').textContent = 'Lecture';
  renderPlayerView();
  attachFocusNav();
}
function backFromPlayer(){
  if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; }
  if(mpegtsInstance){ mpegtsInstance.destroy(); mpegtsInstance=null; }
  playerData = null;
  switchView(previousView);
}
function renderPlayerView(){
  const p = playerData;
  viewEl.innerHTML = `
    <div class="player-page">
      <div class="player-info">
        <div style="display:flex;align-items:center;">
          <button class="player-back" id="playerBackBtn">← Retour</button>
          <div>
            <h2>${p.title}</h2>
            ${p.sub? `<div class="sub">${p.sub}</div>`:''}
          </div>
        </div>
      </div>

      <div class="player-status-line" style="opacity:.5;word-break:break-all;">URL : ${p.src}</div>
    </div>`;
  document.getElementById('playerBackBtn').addEventListener('click', backFromPlayer);

  const stage = document.getElementById('playerStage');

  if(p.kind === 'iframe'){

let mpegtsInstance = null;

function loadVideoSource(video, url, viaProxy){
  const statusEl = document.getElementById('playerStatusLine');
  const isDirectFile = /\.(mp4|webm|ogg)(\?|$)/i.test(url);
  // Beaucoup de portails Stalker/Ministra diffusent en MPEG-TS brut continu
  // (ex: "live.php?...&extension=ts") plutôt qu'en HLS segmenté (.m3u8).
  // Ni <video> natif ni HLS.js ne savent lire ça : il faut mpegts.js (MSE).
  const isRawMpegTs = /extension=ts\b/i.test(url) || /\.ts(\?|$)/i.test(url);
  const actualUrl = viaProxy ? buildProxiedUrl(url) : url;

  if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; }
  if(mpegtsInstance){ mpegtsInstance.destroy(); mpegtsInstance=null; }

  let settled = false;
  const timeout = setTimeout(()=>{
    if(!settled && statusEl) showRetryOptions(video, url, 'Le flux met trop de temps à démarrer (CORS probable ou serveur injoignable).');
  }, 9000);

  video.onerror = ()=>{
    clearTimeout(timeout);
    if(!settled) showRetryOptions(video, url, "Format non lisible directement par le navigateur, ou flux inaccessible.");
  };
  video.oncanplay = ()=>{ settled = true; clearTimeout(timeout); if(statusEl) statusEl.textContent=''; };

  if(isRawMpegTs && window.mpegts && mpegts.getFeatureList().mseLivePlayback){
    if(statusEl) statusEl.textContent = 'Flux MPEG-TS détecté, lecture via mpegts.js...';
    mpegtsInstance = mpegts.createPlayer({ type:'mpegts', isLive:true, url: actualUrl });
    mpegtsInstance.attachMediaElement(video);
    mpegtsInstance.on(mpegts.Events.ERROR, (type, detail)=>{
      clearTimeout(timeout);
      if(!settled) showRetryOptions(video, url, `Erreur mpegts.js (${type}: ${detail}) — CORS probable ou flux hors-ligne.`);
    });
    mpegtsInstance.load();
    mpegtsInstance.play().then(()=>{ settled=true; clearTimeout(timeout); if(statusEl) statusEl.textContent=''; }).catch(()=>{});
  } else if(!isDirectFile && !isRawMpegTs && window.Hls && Hls.isSupported()){
    hlsInstance = new Hls();
    hlsInstance.loadSource(actualUrl);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=>{ settled = true; clearTimeout(timeout); if(statusEl) statusEl.textContent=''; });
    hlsInstance.on(Hls.Events.ERROR, (e,data)=>{
      if(data.fatal){
        clearTimeout(timeout);
        if(!settled) showRetryOptions(video, url, "Impossible de charger ce flux avec HLS.js (CORS, ou format non standard) : "+data.details);
      }
    });
  } else {
    video.src = actualUrl;
    video.play().catch(()=>{});
  }
}

function buildProxiedUrl(url){
  const proxy = (state.proxy||'').trim();
  if(!proxy) return url;
  if(proxy.endsWith('=') || proxy.endsWith('/')) return proxy + encodeURIComponent(url);
  const p = new URL(proxy);
  p.searchParams.set('url', url);
  return p.toString();
}

function showRetryOptions(video, originalUrl, message){
  const statusEl = document.getElementById('playerStatusLine');
  if(!statusEl) return;
  const hasProxy = !!(state.proxy||'').trim();
  statusEl.innerHTML = `
    <span style="color:var(--danger);">${message}</span>
    ${hasProxy ? ` — <button class="btn secondary" id="retryProxyBtn" style="padding:4px 10px;font-size:11px;margin-left:6px;">Réessayer via le proxy</button>` : ''}
  `;
  const retryBtn = document.getElementById('retryProxyBtn');
  if(retryBtn) retryBtn.addEventListener('click', ()=>{
    statusEl.textContent = 'Nouvel essai via le proxy...';
    loadVideoSource(video, originalUrl, true);
  });
}
function playItem(item){
  if(item.type==='youtube') openFramePlayer(item.title, `https://www.youtube.com/embed/${item.id}?autoplay=1`, item.source);
  else openVideoPlayer(item.title, item.url, item.source);
}

/* ===================== D-PAD / KEYBOARD NAVIGATION ===================== */
function attachFocusNav(){
  const focusables = Array.from(document.querySelectorAll('.tile, .nav-item, .subtab, input, .btn, select'));
  focusables.forEach(el=>{
    el.addEventListener('mouseenter', ()=> setFocus(el));
    el.addEventListener('keydown', e=>{ if(e.key==='Enter') el.click(); });
  });
  // Focus le premier élément pertinent de la vue si rien n'est focus
  if(!document.activeElement || document.activeElement===document.body){
    const first = document.querySelector('.view .tile, .view .btn');
    if(first) setFocus(first);
  }
}
function setFocus(el){
  document.querySelectorAll('.focused').forEach(f=>f.classList.remove('focused'));
  el.classList.add('focused');
  el.focus({preventScroll:false});
  el.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});
}
function spatialNav(dir){
  const current = document.querySelector('.focused') || document.activeElement;
  const candidates = Array.from(document.querySelectorAll('.tile, .nav-item, .subtab, input, .btn'))
    .filter(el => el.offsetParent !== null);
  if(!current || !candidates.length) return;
  const cRect = current.getBoundingClientRect();
  const cx = cRect.left + cRect.width/2, cy = cRect.top + cRect.height/2;
  let best = null, bestScore = Infinity;
  for(const el of candidates){
    if(el === current) continue;
    const r = el.getBoundingClientRect();
    const ex = r.left + r.width/2, ey = r.top + r.height/2;
    const dx = ex - cx, dy = ey - cy;
    let primary, ortho, aligned;
    if(dir==='right'){ if(dx<=4) continue; primary=dx; ortho=Math.abs(dy); }
    else if(dir==='left'){ if(dx>=-4) continue; primary=-dx; ortho=Math.abs(dy); }
    else if(dir==='down'){ if(dy<=4) continue; primary=dy; ortho=Math.abs(dx); }
    else if(dir==='up'){ if(dy>=-4) continue; primary=-dy; ortho=Math.abs(dx); }
    const score = primary + ortho*2.2;
    if(score < bestScore){ bestScore = score; best = el; }
  }
  if(best) setFocus(best);
}
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ if(state.view==='player') backFromPlayer(); return; }
  const tag = document.activeElement?.tagName;
  if(tag==='INPUT' || tag==='TEXTAREA') return; // laisse taper du texte normalement
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
    spatialNav({ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'}[e.key]);
  }
});

/* ===================== GLOBAL SEARCH (simple filter across loaded sources) ===================== */
document.getElementById('globalSearch').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.tile .tile-title').forEach(t=>{
    const tile = t.closest('.tile');
    if(!tile) return;
    tile.style.display = t.textContent.toLowerCase().includes(q) ? '' : (q? 'none':'');
  });
});

/* ===================== INIT ===================== */
render();
</script>
