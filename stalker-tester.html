<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testeur Stalker Portal</title>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
<style>
  body{background:#0A0E14;color:#E8ECF1;font-family:monospace;padding:20px;max-width:800px;margin:0 auto;}
  h1{color:#FFB020;font-size:20px;margin-bottom:20px;}
  label{display:block;font-size:12px;color:#8B96A5;margin:12px 0 4px;}
  input{width:100%;padding:10px;border-radius:6px;border:1px solid #2a3340;background:#0D1218;color:#fff;font-family:monospace;font-size:13px;box-sizing:border-box;}
  button{margin-top:16px;padding:10px 18px;background:#FFB020;color:#1a1300;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-family:monospace;}
  button:disabled{opacity:.5;}
  .step{margin-top:22px;padding:14px;background:#12171F;border-radius:8px;border-left:3px solid #2DD4BF;}
  .step h3{margin:0 0 8px;font-size:13px;color:#2DD4BF;}
  .step pre{white-space:pre-wrap;word-break:break-all;font-size:11px;color:#C9D2DC;margin:0;max-height:300px;overflow:auto;}
  .error{border-left-color:#FF5D5D;}
  .error h3{color:#FF5D5D;}
  .ok{color:#4ADE80;}
  select{width:100%;padding:10px;border-radius:6px;border:1px solid #2a3340;background:#0D1218;color:#fff;font-family:monospace;font-size:13px;box-sizing:border-box;}
  video{width:100%;background:#000;margin-top:10px;border-radius:6px;}
</style>
</head>
<body>
<h1>🔧 Testeur Stalker Portal (isolé)</h1>

<label>URL du portail</label>
<input id="portal" placeholder="http://foxbleu.pro:80/c">

<label>Adresse MAC</label>
<input id="mac" placeholder="00:1A:79:BA:2D:3F">

<label>Proxy (optionnel, ex: ton URL Val Town)</label>
<input id="proxy" placeholder="https://STREAMHUB--xxxx.web.val.run">

<button id="runHandshake">1. Tester le Handshake</button>

<div id="log"></div>

<script>
const logEl = document.getElementById('log');

function addStep(title, content, isError){
  const div = document.createElement('div');
  div.className = 'step' + (isError ? ' error' : '');
  div.innerHTML = `<h3>${isError?'❌':'✅'} ${title}</h3><pre>${content}</pre>`;
  logEl.appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function proxiedFetch(url, headers, proxy){
  if(!proxy) return fetch(url, headers ? {headers} : undefined);
  const p = new URL(proxy);
  p.searchParams.set('url', url);
  if(headers) p.searchParams.set('headers', JSON.stringify(headers));
  return fetch(p.toString());
}

let sessionToken = null;
let sessionMac = null;
let sessionPortal = null;
let sessionProxy = null;

document.getElementById('runHandshake').addEventListener('click', async ()=>{
  logEl.innerHTML = '';
  const portal = document.getElementById('portal').value.replace(/\/$/,'');
  const mac = document.getElementById('mac').value.trim();
  const proxy = document.getElementById('proxy').value.trim();
  sessionPortal = portal; sessionMac = mac; sessionProxy = proxy;

  if(!portal || !mac){ addStep('Erreur', 'Renseigne au minimum le portail et la MAC.', true); return; }

  const cookieMac = `mac=${encodeURIComponent(mac)}`;
  const hsUrl = `${portal}/portal.php?type=stb&action=handshake&JsHttpRequest=1-xml`;

  addStep('Requête envoyée', `GET ${hsUrl}\nCookie: ${cookieMac}\nProxy utilisé : ${proxy || '(aucun, appel direct)'}`);

  try{
    const res = await proxiedFetch(hsUrl, {'Cookie': cookieMac}, proxy);
    const text = await res.text();
    addStep(`Réponse brute (status ${res.status})`, text || '(réponse vide)', !text);

    if(!text){ return; }
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ addStep('Erreur de parsing JSON', 'La réponse n\'est pas du JSON valide : '+e.message, true); return; }

    const token = data?.js?.token;
    if(!token){ addStep('Token manquant', 'Le handshake a répondu mais sans champ js.token. Le portail ou la MAC est peut-être invalide.', true); return; }

    sessionToken = token;
    addStep('Token obtenu', token);

    // Étape suivante : récupérer les chaînes
    await fetchChannels();
  }catch(e){
    addStep('Échec réseau', 'La requête a échoué avant même d\'atteindre le serveur (CORS, mixed-content, ou portail injoignable).\nDétail : '+e.message, true);
  }
});

async function fetchChannels(){
  const cookieMac = `mac=${encodeURIComponent(sessionMac)}`;
  const url = `${sessionPortal}/portal.php?type=itv&action=get_all_channels&JsHttpRequest=1-xml`;
  addStep('Requête chaînes', `GET ${url}\nAuthorization: Bearer ${sessionToken}`);
  try{
    const res = await proxiedFetch(url, {'Authorization':'Bearer '+sessionToken, 'Cookie':cookieMac}, sessionProxy);
    const text = await res.text();
    if(!text){ addStep('Réponse vide', 'Aucune chaîne reçue.', true); return; }
    const data = JSON.parse(text);
    const list = data?.js?.data || [];
    addStep(`${list.length} chaînes reçues`, list.slice(0,5).map(c=>`${c.name} — cmd: ${c.cmd}`).join('\n') + (list.length>5?'\n...':''));

    if(list.length){
      // Sélecteur de chaîne pour tester create_link
      const selDiv = document.createElement('div');
      selDiv.className = 'step';
      selDiv.innerHTML = `<h3>2. Tester la résolution d'un flux (create_link)</h3>
        <select id="chanSelect">${list.map((c,i)=>`<option value="${i}">${c.name}</option>`).join('')}</select>
        <button id="runCreateLink" style="margin-top:10px;">Résoudre le flux</button>`;
      logEl.appendChild(selDiv);
      document.getElementById('runCreateLink').addEventListener('click', ()=>{
        const idx = document.getElementById('chanSelect').value;
        testCreateLink(list[idx]);
      });
    }
  }catch(e){
    addStep('Échec réseau (chaînes)', e.message, true);
  }
}

async function testCreateLink(channel){
  const cookieMac = `mac=${encodeURIComponent(sessionMac)}`;
  const url = `${sessionPortal}/portal.php?type=itv&action=create_link&cmd=${encodeURIComponent(channel.cmd)}&JsHttpRequest=1-xml`;
  addStep(`Requête create_link pour "${channel.name}"`, `GET ${url}`);
  try{
    const res = await proxiedFetch(url, {'Authorization':'Bearer '+sessionToken, 'Cookie':cookieMac}, sessionProxy);
    const text = await res.text();
    addStep(`Réponse brute create_link (status ${res.status})`, text || '(vide)', !text);
    if(!text) return;
    const data = JSON.parse(text);
    const streamUrl = (data?.js?.cmd || '').replace(/^ffmpeg\s+/i,'').trim();
    if(!streamUrl){ addStep('Aucune URL de flux', 'Le champ js.cmd est vide dans la réponse.', true); return; }

    addStep('URL de flux résolue', streamUrl);

    // Test de lecture réelle via le proxy (au lieu de juste deviner le format)
    const playDiv = document.createElement('div');
    playDiv.className = 'step';
    playDiv.innerHTML = `<h3>3. Tester la lecture réelle (via le proxy)</h3>
      <button id="runPlayback">▶ Lire ce flux</button>
      <video id="testVideo" controls></video>
      <div id="playbackStatus" style="margin-top:8px;font-size:11px;color:#8B96A5;"></div>`;
    logEl.appendChild(playDiv);
    playDiv.scrollIntoView({behavior:'smooth'});

    document.getElementById('runPlayback').addEventListener('click', ()=>{
      const video = document.getElementById('testVideo');
      const statusEl = document.getElementById('playbackStatus');
      const proxy = sessionProxy;
      if(!proxy){ statusEl.textContent = 'Aucun proxy renseigné — la lecture directe échouera presque certainement (CORS).'; }

      function proxiedPlaybackUrl(url, headers){
        if(!proxy) return url;
        const p = new URL(proxy);
        p.searchParams.set('url', url);
        if(headers) p.searchParams.set('headers', JSON.stringify(headers));
        return p.toString();
      }
      const cookieMac = `mac=${encodeURIComponent(sessionMac)}`;
      const actualUrl = proxiedPlaybackUrl(streamUrl, {'Cookie': cookieMac});

      statusEl.textContent = 'Connexion au flux via mpegts.js...';
      if(window.__testPlayer){ try{ window.__testPlayer.destroy(); }catch(e){} }

      if(window.mpegts && mpegts.getFeatureList().mseLivePlayback){
        const player = mpegts.createPlayer({type:'mpegts', isLive:true, url: actualUrl});
        window.__testPlayer = player;
        player.attachMediaElement(video);
        player.on(mpegts.Events.ERROR, (type, detail)=>{
          statusEl.textContent = `❌ Erreur mpegts.js : ${type} — ${detail}`;
        });
        let lastTime = 0, playedTicks = 0;
        const watch = setInterval(()=>{
          if(!window.__testPlayer){ clearInterval(watch); return; }
          if(video.currentTime > lastTime){
            playedTicks++;
            statusEl.textContent = `✅ Lecture en cours depuis ${video.currentTime.toFixed(1)}s (${playedTicks} vérifications OK)`;
          } else if(video.currentTime === lastTime && playedTicks > 0){
            statusEl.textContent = `⚠️ Bloqué à ${video.currentTime.toFixed(1)}s depuis la dernière vérification — possible coupure du proxy.`;
          }
          lastTime = video.currentTime;
        }, 2000);
        player.load();
        player.play().catch(e=>{ statusEl.textContent = 'Erreur play() : '+e.message; });
      } else {
        statusEl.textContent = 'mpegts.js non supporté par ce navigateur.';
      }
    });

    // Test du protocole
    if(streamUrl.startsWith('rtmp://') || streamUrl.startsWith('rtsp://')){
      addStep('⚠️ Protocole non lisible par un navigateur', `Cette URL utilise le protocole ${streamUrl.split('://')[0]}://, que les navigateurs web ne savent PAS lire nativement (ni HLS.js, ni <video>). C'est probablement la vraie cause du problème : il faudrait un serveur de transcodage RTMP→HLS entre le portail et l'appli, ou utiliser une vraie box/app MAG.`, true);
    } else if(streamUrl.includes('.m3u8')){
      addStep('✅ Format HLS détecté', 'Cette URL devrait être lisible par HLS.js dans le navigateur (si CORS géré par le proxy).');
    } else {
      addStep('Format à vérifier', `L'URL ne contient ni .m3u8 ni rtmp:// — teste-la manuellement en la collant dans VLC pour confirmer son format réel.`);
    }
  }catch(e){
    addStep('Échec réseau (create_link)', e.message, true);
  }
}
</script>
</body>
</html>
